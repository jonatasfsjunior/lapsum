<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="{{ site.theme_color | default: '#0000' }}">
<meta
    name="description"
    content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
>
<meta name="title" content="{{ page.title }}{% if page.price %} — {{ page.price }}{% endif %} - {{ site.title | default: 'Lapsum Criativo' }}">
<meta name="keywords" content="Design 3D, Loja">
<meta name="robots" content="index, follow">
<meta name="author" content="{{ page.author }}">

<!-- Open Graph -->
{% if page.layout == 'post' %}
    <meta property="og:type" content="article">
{% elsif page.layout == 'product' %}
    <meta property="og:type" content="product">
{% else %}
    <meta property="og:type" content="website">
{% endif %}

<meta property="og:title" content="{{ page.title }}{% if page.price %} — {{ page.price }}{% endif %} - {{ site.title | default: 'Lapsum Criativo' }}">
<meta
    property="og:description"
    content="{% if page.price %}{{ page.price }} · {% endif %}{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
>
<!-- Thumbnail para embeds -->
<meta property="og:image" content="{% if page.image %}{{ page.image | absolute_url }}{% else %}{{ site.image | absolute_url }}{% endif %}">
<meta property="og:image:alt" content="{{ page.title | default: site.title }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{% if page.image %}{{ page.image | absolute_url }}{% else %}{{ site.image | absolute_url }}{% endif %}">

<!-- OG de produto -->
{% if page.layout == 'product' and page.price-br %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Product",
  "name": "{{ page.title }}",
  "description": "{{ page.description | default: site.description }}",
  "image": "{{ page.image | default: site.image | absolute_url }}",
  "brand": {
    "@type": "Brand",
    "name": "Lapsum Criativo"
  },
  "offers": {
    "@type": "Offer",
    "price": "{{ page.price-br | remove: 'R$' | strip | replace: '.', '' | replace: ',', '.' }}",
    "priceCurrency": "BRL",
    "availability": "https://schema.org/InStock",
    "shippingDetails": {
      "@type": "OfferShippingDetails",
      "shippingRate": {
        "@type": "MonetaryAmount",
        "value": "0",
        "currency": "BRL"
      },
      "deliveryTime": {
        "@type": "ShippingDeliveryTime",
        "handlingTime": {
          "@type": "QuantitativeValue",
          "minValue": 0,
          "maxValue": 0,
          "unitCode": "DAY"
        },
        "transitTime": {
          "@type": "QuantitativeValue",
          "minValue": 0,
          "maxValue": 0,
          "unitCode": "DAY"
        }
      }
    },
    "hasMerchantReturnPolicy": {
      "@type": "MerchantReturnPolicy",
      "applicableCountry": "BR",
      "returnPolicyCategory": "https://schema.org/MerchantReturnNotPermitted"
    }
  }
}
</script>
{% endif %}
